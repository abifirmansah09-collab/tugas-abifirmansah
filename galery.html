<html>
<head>
    <title>Galeri</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }

        h2{
            margin-top: 20px;
        }

        .gallery{
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin: 20px;
        }

        .gallery img{
            width: 200px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .gallery img:hover{
            transform: scale(1.1);
        }

        .caption{
            margin-top: 5px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<h2>Galeri Foto</h2>
<p>Dokumentasi kegiatan dan momen yang saya abadikan.</p>

<div class="gallery">
    <div>
        <img src="foto1.jpg.jpeg">
        <div class="caption">Kegiatan Kampus</div>
    </div>

    <div>
        <img src="foto2.jpg.jpeg">
        <div class="caption">Belajar di Lab</div>
    </div>

    <div>
        <img src="foto3.jpg.jpeg">
        <div class="caption">Momen Bersama Teman</div>
    </div>
</div>

<br>
<a href="index.html">Kembali</a>

</body>
</html>
